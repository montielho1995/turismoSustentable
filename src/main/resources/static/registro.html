<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Turismo Sustentable</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fas fa-bicycle text-success"></i> ¡Pedalea y Explora!
        </a>
        <div class="navbar-nav ms-auto">
            <a href="index.html#login-anchor" class="btn btn-outline-success btn-sm rounded-pill px-4">
                <i class="fas fa-sign-in-alt"></i> Ya tengo cuenta
            </a>
        </div>
    </div>
</nav>

<section class="container my-5">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-5">

                    <div class="text-center mb-4">
                        <h2 class="fw-bold"><i class="fas fa-user-plus text-success"></i> Crea tu Cuenta</h2>
                        <p class="text-muted">Completa tus datos para empezar a rodar.</p>
                    </div>

                    <div id="status-message" class="alert alert-danger d-none p-3 small" role="alert">
                    </div>

                    <form id="registro-form" novalidate>
                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="reg-nombre" placeholder="Nombre" required>
                                    <label for="reg-nombre">Nombre</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="text" class="form-control" id="reg-apellido" placeholder="Apellido" required>
                                    <label for="reg-apellido">Apellido</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-floating mb-3">
                            <input type="email" class="form-control" id="reg-email" placeholder="Correo Electrónico" required>
                            <label for="reg-email">Correo Electrónico</label>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-md-6">
                                <div class="form-floating">
                                    <input type="date" class="form-control" id="reg-nacimiento" placeholder="Fecha de Nacimiento" required>
                                    <label for="reg-nacimiento">Fecha de Nacimiento</label>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <select id="reg-genero" class="form-select" style="height: 58px;" required>
                                    <option value="" disabled selected>Selecciona tu Género</option>
                                    <option value="FEMENINO">Femenino</option>
                                    <option value="MASCULINO">Masculino</option>
                                    <option value="NO_BINARIO">No Binario</option>
                                    <option value="OTRO">Otro</option>
                                    <option value="PREFIERO_NO_DECIR">Prefiero no decir</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-floating">
                            <input type="password" class="form-control" id="reg-password" placeholder="Contraseña" required>
                            <label for="reg-password">Contraseña</label>
                        </div>
                        <small class="form-text text-muted px-1">
                            Mín. 6 caracteres, 1 mayúscula y 1 símbolo (ej: !@#&*)
                        </small>

                        <button type="submit" class="btn btn-success w-100 py-3 fw-bold mt-4 rounded-pill">
                            Registrarme
                        </button>
                    </form>

                    <div class="text-center mt-4">
                        <small class="text-muted">¿Ya tienes cuenta? <a href="index.html#login-anchor" class="text-success fw-bold text-decoration-none">Inicia sesión</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<footer class="bg-dark text-white text-center py-4 mt-auto">
    <p class="mb-0">&copy; 2025 Turismo Sustentable Río Grande.</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script src="js/auth.js"></script>
<script src="js/registro.js"></script>

</body>
</html>
