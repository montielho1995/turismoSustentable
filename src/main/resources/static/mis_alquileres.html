<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mis Alquileres - Turismo Sustentable</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-bicycle text-success"></i> ¡Pedalea y Explora!</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    <li class="nav-item"><a class="nav-link" href="alquiler.html">Inventario</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Mis Alquileres</a></li>
                    <li class="nav-item ms-3"><button onclick="logout()" class="btn btn-outline-light btn-sm rounded-pill px-3"><i class="fas fa-sign-out-alt"></i> Salir</button></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5 pt-5">
        <h2 class="mb-4 fw-bold"><i class="fas fa-history text-success"></i> Mi Historial de Viajes</h2>

        <div class="card shadow-sm border-0 mb-5">
            <div class="card-header bg-success text-white fw-bold">
                <i class="fas fa-stopwatch"></i> En Curso (Activos)
            </div>
            <div class="card-body">
                <div id="container-activos" class="text-center text-muted py-3">Cargando...</div>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="card-header bg-secondary text-white fw-bold">
                <i class="fas fa-check-double"></i> Finalizados
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-hover align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>Bicicleta</th>
                                <th>Inicio</th>
                                <th>Fin</th>
                                <th>Costo Total</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-historial">
                            </tbody>
                    </table>
                </div>
                <div id="mensaje-historial" class="text-center text-muted mt-2"></div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto"><p class="mb-0">&copy; 2025 Turismo Sustentable.</p></footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="js/auth.js"></script>
    <script src="js/mis_alquileres.js"></script>

</body>
</html>
